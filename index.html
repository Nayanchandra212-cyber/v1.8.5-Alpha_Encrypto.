<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="tab-title">Encrypto v1.8.5 | ALPHA</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
    :root { --bg: #0f172a; --text: #f8fafc; --accent: #38bdf8; --panel: rgba(30, 41, 59, 0.7); --font: 'Inter', sans-serif; }
    
    body.theme-hacker { 
        --bg: #020a02; --text: #00ff41; --accent: #00ff41; --panel: #050f05; 
        --font: 'JetBrains Mono', monospace; 
    }
    body.theme-modern { 
        --bg: #000; --text: #fff; --accent: #ff0000; --panel: #111; 
        --font: 'Orbitron', sans-serif; 
    }
    body.theme-lite { 
        --bg: #ffffff; --text: #1a202c; --accent: #2b6cb0; --panel: #f7fafc; 
        --font: 'Inter', sans-serif; 
    }

    body { 
        background: var(--bg); color: var(--text); font-family: var(--font); 
        margin: 0; padding: 20px; transition: all 0.3s ease; 
        padding-bottom: 280px; user-select: none;
    }

    .container { 
        max-width: 550px; margin: auto; border: 1px solid var(--accent); padding: 20px; 
        background: var(--panel); backdrop-filter: blur(10px); border-radius: 8px;
    }
    
    .header { text-align: center; border-bottom: 1px solid var(--accent); padding-bottom: 10px; margin-bottom: 15px; }
    h1 { font-size: 1.2rem; letter-spacing: 2px; margin: 0; }
    .credit { font-size: 0.6rem; color: #888; font-family: 'JetBrains Mono', monospace; }

    textarea, input, select { 
        width: 100%; background: rgba(0,0,0,0.4); border: 1px solid #444; 
        color: var(--text); padding: 12px; margin: 6px 0; border-radius: 4px; 
        font-family: var(--font); font-size: 0.85rem; box-sizing: border-box;
    }
    textarea:focus, input:focus { border-color: var(--accent); outline: none; }

    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    button { 
        background: var(--accent); color: #000; border: none; padding: 14px; 
        cursor: pointer; font-weight: bold; font-family: var(--font); border-radius: 4px;
    }
    button:hover { opacity: 0.8; }

    /* VIRTUAL KEYBOARD */
    #kb-tray { 
        position: fixed; bottom: 0; left: 0; width: 100%; background: #000; 
        border-top: 2px solid var(--accent); padding: 10px 0; z-index: 9999;
    }
    #v-kb { 
        display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; 
        max-width: 600px; margin: auto; padding: 0 10px;
    }
    .key { 
        background: #222; padding: 14px 0; text-align: center; cursor: pointer; 
        font-size: 0.85rem; border-radius: 4px; color: #fff; border: 1px solid #333;
    }
    .key:active { background: var(--accent); color: #000; }
    .key.wide { grid-column: span 2; background: #333; font-weight: bold; }
    .key.active-caps { background: var(--accent); color: #000; }

    .hidden { display: none !important; }
</style>
</head>
<body oncontextmenu="return false;" class="theme-hacker">

<div id="boot-gate">
    <div class="container">
        <div class="header">
            <h1>ENCRYPTO v1.8.5</h1>
            <div class="credit">ORIGINAL CORE BY: OMKAR DAS | HARDENED BY: NAYAN</div>
        </div>
        
        <select id="themeEng" onchange="setTheme(this.value)">
            <option value="hacker">THEME: HACKER_TERMINAL (MONO)</option>
            <option value="modern">THEME: MODERN_GLOW (ORBITRON)</option>
            <option value="lite">THEME: LITE_MINIMAL (INTER)</option>
        </select>

        <div class="btn-group">
            <select id="layer1" onchange="checkCustom()">
                <option value="aes">CIPHER: AES-256</option>
                <option value="rc4">CIPHER: RC4</option>
                <option value="custom">CIPHER: CUSTOM ROT</option>
            </select>
            <input type="number" id="customShift" class="hidden" placeholder="ROT#" min="1" max="25">
        </div>

        <textarea id="itx" placeholder="[INPUT_DATA]" onfocus="curF='itx'"></textarea>
        <input type="password" id="kix" placeholder="[PASSPHRASE]" onfocus="curF='kix'">
        
        <div class="btn-group">
            <button onclick="execute('enc')">ENCRYPT_DATA</button>
            <button onclick="execute('dec')">DECRYPT_DATA</button>
        </div>

        <textarea id="otx" placeholder="[OUTPUT_BLOB]" readonly></textarea>
        
        <div class="btn-group">
            <button onclick="copyOut()">COPY_VAULT</button>
            <button onclick="chameleon()">CHAMELEON_TAB</button>
        </div>
        
        <button onclick="kill()" style="width:100%; margin-top:10px; background:#8b0000; color:white;">EMERGENCY_PURGE</button>
    </div>
</div>

<div id="kb-tray">
    <div id="v-kb"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script>
    let curF = 'itx';
    let isCaps = false; 
    const itx = document.getElementById('itx');
    const kix = document.getElementById('kix');
    const otx = document.getElementById('otx');
    const shiftIn = document.getElementById('customShift');

    function hap(ms) { if (navigator.vibrate) navigator.vibrate(ms); }
    function setTheme(v) { document.body.className = 'theme-' + v; hap(20); }
    
    function chameleon() {
        document.getElementById('tab-title').innerText = "Google Search";
        alert("CHAMELEON: TAB MASKED AS GOOGLE");
        hap([30,50,30]);
    }

    function checkCustom() {
        const type = document.getElementById('layer1').value;
        if(type === 'custom') {
            shiftIn.classList.remove('hidden');
        } else {
            shiftIn.classList.add('hidden');
        }
    }

    // STABLE KEYBOARD LOGIC
    function renderKB() {
        const kb = document.getElementById('v-kb');
        kb.innerHTML = '';
        
        const letters = "qwertyuiopasdfghjklzxcvbnm".split("");
        const numbers = "1234567890!@#$%^&*()".split("");
        
        const frag = document.createDocumentFragment();

        // Letters
        letters.forEach(l => {
            let keyChar = isCaps ? l.toUpperCase() : l;
            let d = document.createElement('div');
            d.className = 'key'; d.innerText = keyChar;
            d.onclick = () => { document.getElementById(curF).value += keyChar; hap(10); };
            frag.appendChild(d);
        });

        // Numbers & Symbols
        numbers.forEach(n => {
            let d = document.createElement('div');
            d.className = 'key'; d.innerText = n;
            d.onclick = () => { document.getElementById(curF).value += n; hap(10); };
            frag.appendChild(d);
        });

        // SHIFT (Caps Toggle)
        let shift = document.createElement('div');
        shift.className = isCaps ? 'key wide active-caps' : 'key wide';
        shift.innerText = isCaps ? "LOWER" : "UPPER";
        shift.onclick = () => { isCaps = !isCaps; renderKB(); hap(25); };
        frag.appendChild(shift);

        // BACKSPACE
        let bk = document.createElement('div');
        bk.className = 'key wide'; bk.innerText = "BACK";
        bk.onclick = () => { 
            let f = document.getElementById(curF);
            f.value = f.value.slice(0, -1);
            hap(15);
        };
        frag.appendChild(bk);

        kb.appendChild(frag);
    }

    // SECURE ENGINE
    function customRot(str, amount) {
        if (amount < 0) amount = 26 + amount;
        return str.replace(/[a-zA-Z]/g, function(c) {
            let base = c <= 'Z' ? 65 : 97;
            return String.fromCharCode(((c.charCodeAt(0) - base + amount) % 26) + base);
        });
    }

    function execute(mode) {
        const key = kix.value;
        let data = itx.value;
        const type = document.getElementById('layer1').value;
        const shift = parseInt(shiftIn.value) || 13;

        if (!key || !data) {
            hap([100,50,100]);
            return alert("ERR: INPUTS OR PASSPHRASE EMPTY");
        }

        try {
            if (mode === 'enc') {
                if(type === 'aes') data = CryptoJS.AES.encrypt(data, key).toString();
                if(type === 'rc4') data = CryptoJS.RC4.encrypt(data, key).toString();
                if(type === 'custom') {
                    // ROT Math FIRST, then AES Encrypt to utilize the user's password
                    let rotated = customRot(data, shift);
                    data = CryptoJS.AES.encrypt(rotated, key).toString();
                }
                otx.value = data;
            } else {
                if(type === 'aes') data = CryptoJS.AES.decrypt(data, key).toString(CryptoJS.enc.Utf8);
                if(type === 'rc4') data = CryptoJS.RC4.decrypt(data, key).toString(CryptoJS.enc.Utf8);
                if(type === 'custom') {
                    // Decrypt AES FIRST, then reverse the ROT Math
                    let decrypted = CryptoJS.AES.decrypt(data, key).toString(CryptoJS.enc.Utf8);
                    if(!decrypted) throw new Error();
                    data = customRot(decrypted, -shift);
                }
                if(!data) throw new Error();
                otx.value = data;
            }
            hap([50,50,50]);
        } catch(e) { 
            otx.value = "ERROR: DECRYPTION FAILED";
            alert("AUTH_FAIL: WRONG KEY OR DATA CORRUPTED"); 
            hap([150,50,150]); 
        }
    }

    function copyOut() { 
        if(!otx.value) return;
        navigator.clipboard.writeText(otx.value); 
        alert("COPIED TO CLIPBOARD"); 
        hap(30); 
    }
    
    function kill() { hap([200,100,200]); window.location.replace("about:blank"); }
    
    window.onload = renderKB;
    window.onblur = () => { if(itx.value || kix.value) kill(); };
</script>
</body>
</html>
